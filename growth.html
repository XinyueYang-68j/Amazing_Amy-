  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('./data/growth-data.json')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          renderBooks(data.books);
          renderInfluencers(data.influencers);
        })
        .catch(function (err) {
          console.error('Failed to load growth data:', err);
        });
    });

    function renderBooks(books) {
      var container = document.getElementById('book-list');
      var categoryMap = {
        cognitiveScience: '认知科学',
        productDesign: '产品设计',
        orgManagement: '组织管理',
        systemThinking: '系统思维',
        literature: '文学'
      };

      Object.keys(books).forEach(function (key) {
        var catName = categoryMap[key] || key;
        var catDiv = document.createElement('div');
        catDiv.className = 'book-category';
        catDiv.innerHTML = '<h4>' + catName + '</h4>';

        var listDiv = document.createElement('div');
        listDiv.className = 'book-list';

        books[key].forEach(function (book) {
          var card = document.createElement('div');
          card.className = 'book-card';

          var statusClass = '';
          if (book.status === '待读') statusClass = 'badge-gray';
          else if (book.status === '在读') statusClass = 'badge-blue';
          else if (book.status === '已读') statusClass = 'badge-green';

          card.innerHTML =
            '<div class="book-info">' +
              '<span class="book-title">' + escapeHtml(book.title) + '</span>' +
              '<span class="book-author">' + escapeHtml(book.author) + '</span>' +
            '</div>' +
            '<span class="badge ' + statusClass + '">' + escapeHtml(book.status) + '</span>';
          listDiv.appendChild(card);
        });

        catDiv.appendChild(listDiv);
        container.appendChild(catDiv);
      });
    }

    function renderInfluencers(influencers) {
      var container = document.getElementById('influencer-list');

      influencers.forEach(function (person) {
        var card = document.createElement('div');
        card.className = 'influencer-card';

        var videosHtml = '';
        person.videos.forEach(function (url, i) {
          videosHtml += '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">视频 ' + (i + 1) + '</a>';
        });

        card.innerHTML =
          '<h4>' + escapeHtml(person.name) + '</h4>' +
          '<span class="ability-tag">' + escapeHtml(person.ability) + '</span>' +
          '<p class="representative">代表作品：' + escapeHtml(person.representative) + '</p>' +
          '<div class="videos">' + videosHtml + '</div>' +
          '<p class="learning-action">' + escapeHtml(person.learningAction) + '</p>';

        container.appendChild(card);
      });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
