<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能力雷达图 - Amy Su</title>
  <link rel="stylesheet" href="./_shared/css/common.css">
  <link rel="stylesheet" href="./_shared/css/radar.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo">Amy Su</a>
      <input type="checkbox" id="navbar-toggle" class="navbar-toggle">
      <label for="navbar-toggle" class="navbar-toggle-label"><span></span></label>
      <ul class="navbar-links">
        <li><a href="index.html">CV</a></li>
        <li><a href="radar.html" class="active">雷达图</a></li>
        <li><a href="growth.html">提高方向</a></li>
        <li><a href="mindmap.html">AI脑图</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section>
      <h2>能力雷达图</h2>
      <p class="radar-desc">基于深度对话的能力自评，12 个维度分三个 Tier</p>

      <div id="chart-radar"></div>

      <div class="cards-container">
        <!-- 卡片由 JS 动态生成 -->
      </div>
    </section>
  </main>

  <script src="./_shared/js/common.js"></script>
  <script src="./_shared/js/echarts.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      try {
        const resp = await fetch('./data/radar-data.json');
        const data = await resp.json();

        // --- Render Radar Chart ---
        const chart = echarts.init(document.getElementById('chart-radar'));
        const indicator = data.dimensions.map(function (d) {
          return { name: d.name, max: 10 };
        });
        const values = data.dimensions.map(function (d) { return d.score; });

        chart.setOption({
          radar: {
            indicator: indicator,
            shape: 'polygon',
            splitNumber: 5,
            axisName: {
              color: '#6B7280',
              fontSize: 12
            },
            splitArea: {
              areaStyle: {
                color: ['#F8F9FA', '#FFFFFF', '#F8F9FA', '#FFFFFF', '#F8F9FA']
              }
            },
            splitLine: {
              lineStyle: { color: '#E5E7EB' }
            },
            axisLine: {
              lineStyle: { color: '#E5E7EB' }
            }
          },
          series: [{
            type: 'radar',
            data: [{
              value: values,
              name: '能力评分',
              areaStyle: { color: 'rgba(37, 99, 235, 0.15)' },
              lineStyle: { color: '#2563EB', width: 2 },
              itemStyle: { color: '#2563EB' }
            }]
          }],
          tooltip: {
            trigger: 'item'
          }
        });

        window.addEventListener('resize', function () { chart.resize(); });

        // --- Render Dimension Cards ---
        var container = document.querySelector('.cards-container');
        data.dimensions.forEach(function (d) {
          var card = document.createElement('div');
          card.className = 'dimension-card';

          var badge = document.createElement('span');
          badge.className = 'tier-badge tier-' + d.tier.toLowerCase();
          badge.textContent = d.tier;

          var title = document.createElement('h3');
          title.textContent = d.name;

          var desc = document.createElement('p');
          desc.textContent = d.desc;

          var caseP = document.createElement('p');
          caseP.className = 'case';
          caseP.textContent = d.case;

          card.appendChild(badge);
          card.appendChild(title);
          card.appendChild(desc);
          card.appendChild(caseP);
          container.appendChild(card);
        });
      } catch (err) {
        console.error('Failed to load radar data:', err);
      }
    });
  </script>
</body>
</html>
